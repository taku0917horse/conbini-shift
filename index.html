<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="シフト管理" />
  <title>コンビニシフト管理</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ナビゲーション -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="shift">
        <span class="nav-icon">📅</span>
        <span class="nav-label">シフト</span>
      </button>
      <button class="nav-btn" data-view="employees">
        <span class="nav-icon">👥</span>
        <span class="nav-label">従業員</span>
      </button>
      <button class="nav-btn" data-view="requirements">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">必要人数</span>
      </button>
      <button class="nav-btn" data-view="print">
        <span class="nav-icon">📤</span>
        <span class="nav-label">共有・データ</span>
      </button>
    </nav>

    <!-- シフトビュー -->
    <div id="view-shift" class="view active">
      <header class="view-header">
        <h1>シフト表</h1>
        <div class="header-right">
          <button id="btn-hour-size" class="btn-size-toggle">コンパクト</button>
          <button id="btn-add-shift" class="btn-primary">＋勤務追加</button>
        </div>
      </header>
      <div id="day-tabs">
        <button class="day-tab active" data-day="月">月</button>
        <button class="day-tab" data-day="火">火</button>
        <button class="day-tab" data-day="水">水</button>
        <button class="day-tab" data-day="木">木</button>
        <button class="day-tab" data-day="金">金</button>
        <button class="day-tab" data-day="土">土</button>
        <button class="day-tab" data-day="日">日</button>
      </div>
      <div id="shift-chart-container">
        <div id="time-labels"></div>
        <div id="shift-lanes"></div>
        <div id="requirement-overlay"></div>
      </div>
    </div>

    <!-- 従業員管理ビュー -->
    <div id="view-employees" class="view">
      <header class="view-header">
        <h1>従業員管理</h1>
        <button id="btn-add-employee" class="btn-primary">＋追加</button>
      </header>
      <ul id="employee-list"></ul>
    </div>

    <!-- 必要人数ビュー -->
    <div id="view-requirements" class="view">
      <header class="view-header">
        <h1>必要人数</h1>
      </header>
      <!-- サブタブ: 不足リストを先頭に -->
      <div id="req-subtab-bar">
        <button class="req-subtab active" data-subtab="shortage">不足リスト</button>
        <button class="req-subtab" data-subtab="tentative">募集中</button>
        <button class="req-subtab" data-subtab="rules">ルール設定</button>
      </div>
      <!-- 不足リスト（デフォルト表示） -->
      <div id="req-sub-shortage" class="req-subview">
        <div id="shortage-filter-bar">
          <button class="shortage-filter-btn active" data-band="all">すべて</button>
          <button class="shortage-filter-btn" data-band="dawn">明朝 3–6</button>
          <button class="shortage-filter-btn" data-band="morn">早朝 6–9</button>
          <button class="shortage-filter-btn" data-band="day">日勤 9–17</button>
          <button class="shortage-filter-btn" data-band="eve">夕勤 17–22</button>
          <button class="shortage-filter-btn" data-band="night">夜勤 22–翌3</button>
        </div>
        <div id="shortage-list"></div>
      </div>
      <!-- 募集中リスト -->
      <div id="req-sub-tentative" class="req-subview hidden">
        <div id="tentative-list"></div>
      </div>
      <!-- ルール設定（全曜日一覧） -->
      <div id="req-sub-rules" class="req-subview hidden">
        <div id="req-controls">
          <button id="btn-add-req" class="btn-primary">＋追加</button>
          <select id="req-copy-src">
            <option value="月">月</option>
            <option value="火">火</option>
            <option value="水">水</option>
            <option value="木">木</option>
            <option value="金">金</option>
            <option value="土">土</option>
            <option value="日">日</option>
          </select>
          <button id="btn-copy-all-days" class="btn-secondary">全日コピー</button>
        </div>
        <div id="req-rules-list"></div>
      </div>
    </div>

    <!-- 共有・データビュー -->
    <div id="view-print" class="view">
      <header class="view-header">
        <h1>共有・データ</h1>
        <div class="header-right">
          <button id="btn-save-image" class="btn-secondary">画像保存</button>
        </div>
      </header>
      <div id="print-scroll-area">
        <div id="print-preview"></div>
        <div id="data-section">
          <div class="data-section-title">データ管理（バックアップ・共有）</div>
          <div class="data-card">
            <div class="data-card-body">
              <div class="data-card-title">書き出し（エクスポート）</div>
              <div class="data-card-desc">全データを JSON ファイルで書き出します。LINE などで送って共有できます。</div>
            </div>
            <button id="btn-export" class="btn-secondary">書き出し</button>
          </div>
          <div class="data-card">
            <div class="data-card-body">
              <div class="data-card-title">読み込み（インポート）</div>
              <div class="data-card-desc">JSON ファイルを選択して現在のデータを復元します。上書き前に確認が入ります。</div>
            </div>
            <button id="btn-import-trigger" class="btn-secondary">読み込み</button>
            <input type="file" id="import-file" accept=".json,application/json" style="display:none" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- モーダル: 勤務追加/編集 -->
  <div id="modal-shift" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-shift-title">勤務追加</h2>
      <div class="form-group">
        <label>従業員</label>
        <select id="shift-emp-select"></select>
      </div>
      <div class="form-group" id="day-toggle-group">
        <label>曜日 <span id="day-toggle-hint" class="form-hint">（複数選択可）</span></label>
        <div id="day-toggle-buttons"></div>
      </div>
      <div class="form-group">
        <label>プリセット</label>
        <div id="preset-buttons"></div>
      </div>
      <div class="form-group">
        <label>開始時刻</label>
        <input type="time" id="shift-start" />
      </div>
      <div class="form-group">
        <label>終了時刻（翌4:00の場合 04:00、翌6:00の場合 06:00）</label>
        <input type="time" id="shift-end" />
      </div>
      <div class="form-group">
        <label>休憩（分）</label>
        <div class="break-btns">
          <button type="button" class="break-preset-btn" data-min="0">なし</button>
          <button type="button" class="break-preset-btn" data-min="45">45分</button>
          <button type="button" class="break-preset-btn" data-min="60">60分</button>
        </div>
        <input type="number" id="shift-break" min="0" max="240" step="5" value="0" />
      </div>
      <div class="form-group hidden" id="tentative-group">
        <label class="toggle-row">
          <span>仮（募集中）</span>
          <span class="toggle-switch">
            <input type="checkbox" id="shift-is-tentative" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
        </label>
      </div>
      <div class="modal-actions">
        <button id="btn-shift-save" class="btn-primary">保存</button>
        <button id="btn-shift-delete" class="btn-danger hidden">削除</button>
        <button id="btn-shift-cancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- モーダル: 必要人数ルール追加/編集 -->
  <div id="modal-req" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-req-title">ルール追加</h2>
      <div class="form-group">
        <label>曜日</label>
        <select id="req-day-modal">
          <option value="月">月曜日</option>
          <option value="火">火曜日</option>
          <option value="水">水曜日</option>
          <option value="木">木曜日</option>
          <option value="金">金曜日</option>
          <option value="土">土曜日</option>
          <option value="日">日曜日</option>
        </select>
      </div>
      <div class="form-group">
        <label>プリセット</label>
        <div id="req-preset-buttons"></div>
      </div>
      <div class="form-group">
        <label>開始時刻</label>
        <input type="time" id="req-start" />
      </div>
      <div class="form-group">
        <label>終了時刻（翌4:00の場合 04:00、翌6:00の場合 06:00）</label>
        <input type="time" id="req-end" />
      </div>
      <div class="form-group">
        <label>必要人数</label>
        <div class="stepper-control">
          <button id="req-count-dec" type="button" class="stepper-btn">－</button>
          <span id="req-count-val" class="stepper-val">2</span>
          <button id="req-count-inc" type="button" class="stepper-btn">＋</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="btn-req-save" class="btn-primary">保存</button>
        <button id="btn-req-delete" class="btn-danger hidden">削除</button>
        <button id="btn-req-cancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- モーダル: 従業員追加/編集 -->
  <div id="modal-employee" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-emp-title">従業員追加</h2>
      <div class="form-group">
        <label>名前</label>
        <input type="text" id="emp-name" placeholder="例: 田中" />
      </div>
      <div class="form-group">
        <label>略称 <span class="form-hint">（印刷用・2〜3文字。未入力で名前の先頭2文字）</span></label>
        <input type="text" id="emp-display-name" placeholder="例: 田中、佐木" maxlength="4" />
      </div>
      <div class="form-group">
        <label>区分 <span class="form-hint">（主な勤務帯。制約なし）</span></label>
        <div id="category-buttons">
          <button type="button" class="cat-btn" data-cat="明朝">明朝</button>
          <button type="button" class="cat-btn" data-cat="早朝">早朝</button>
          <button type="button" class="cat-btn" data-cat="日勤">日勤</button>
          <button type="button" class="cat-btn" data-cat="夕勤">夕勤</button>
          <button type="button" class="cat-btn" data-cat="夜勤">夜勤</button>
        </div>
      </div>
      <div class="form-group">
        <label>色</label>
        <div id="color-picker"></div>
      </div>
      <div class="form-group">
        <label>メモ <span class="form-hint">（覚え書き。判定には使いません）</span></label>
        <textarea id="emp-memo" rows="2" maxlength="200" placeholder="例: 火曜NG、テスト期間注意"></textarea>
      </div>
      <div class="form-group">
        <label class="toggle-row">
          <span>店長関連 <span class="form-hint">（仮シフトを立てられる）</span></span>
          <span class="toggle-switch">
            <input type="checkbox" id="emp-is-manager" />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </span>
        </label>
      </div>
      <div class="modal-actions">
        <button id="btn-emp-save" class="btn-primary">保存</button>
        <button id="btn-emp-delete" class="btn-danger hidden">削除</button>
        <button id="btn-emp-cancel" class="btn-secondary">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- モーダル: 従業員週間スケジュール -->
  <div id="modal-emp-week" class="modal hidden">
    <div class="modal-content emp-week-modal">
      <div class="emp-week-header-row">
        <div class="emp-week-name-row">
          <div id="emp-week-color-dot" class="emp-week-dot"></div>
          <div>
            <div id="emp-week-emp-name" class="emp-week-name"></div>
            <div id="emp-week-category" class="emp-week-cat"></div>
          </div>
        </div>
        <button id="btn-emp-week-edit" class="btn-secondary btn-sm">編集</button>
      </div>
      <div id="emp-week-body" class="emp-week-body"></div>
      <div id="emp-week-total" class="emp-week-total"></div>
      <div class="modal-actions">
        <button id="btn-emp-week-close" class="btn-secondary">閉じる</button>
      </div>
    </div>
  </div>

  <!-- 印刷専用テーブル -->
  <div id="print-area"></div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
